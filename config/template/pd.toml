[log]
level = "info"
[labels]
dc = "${DC_LABEL}"
[replication]
enable-placement-rules = true
isolation-level = "dc"
location-labels = ["dc"]
max-replicas = 2
[replication-mode]
replication-mode = "even-replicas"
[replication-mode.even-replicas]
downgrade-timeout = "20s"
[replication-mode.even-replicas.arbitration]
script = ["/bin/bash", "/usr/local/bin/keepalived_arbiter.sh", "${VIP}"]
type = "custom-script"
